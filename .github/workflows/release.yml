name: Release HQUD

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install C dependencies for eBPF
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-generic

      - name: Build Release Package
        run: make release-pkg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hqud-linux-amd64.tar.gz
